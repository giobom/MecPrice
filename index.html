<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MecPrice - Orçamento + Estoque</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#f7c948" />

    <link rel="stylesheet" href="style.css" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZPMXW0E3H"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-2ZPMXW0E3H');
    </script>
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <div class="brand-text">
                <h1>MecPrice</h1>
                <small>Orçamento + Estoque (PWA)</small>
            </div>
        </div>

        <nav class="tabs" data-tabs>
            <button class="tab-btn active" type="button" data-tab="tab-orcamento">Orçamento</button>
            <button class="tab-btn" type="button" data-tab="tab-estoque">Estoque</button>
        </nav>
    </header>

    <main class="container">

        <div id="tab-orcamento" class="tab-pane active" data-pane="tab-orcamento">
            <section class="card">
                <h2>Dados do Cliente e Serviço</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="cliente">Nome do Cliente</label>
                        <input type="text" id="cliente" placeholder="Ex: João da Silva" />
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone / WhatsApp</label>
                        <input type="text" id="telefone" placeholder="Ex: (31) 99999-9999" />
                    </div>
                    <div class="form-group">
                        <label for="cpfCnpj">CPF/CNPJ</label>
                        <input type="text" id="cpfCnpj" placeholder="Ex: 000.000.000-00" />
                    </div>
                    <div class="form-group">
                        <label for="placa">Placa</label>
                        <input type="text" id="placa" placeholder="Ex: ABC1D23" />
                    </div>
                    <div class="form-group">
                        <label for="modelo">Modelo</label>
                        <input type="text" id="modelo" placeholder="Ex: Gol 1.6" />
                    </div>
                    <div class="form-group">
                        <label for="ano">Ano</label>
                        <input type="number" id="ano" placeholder="Ex: 2016" />
                    </div>
                    <div class="form-group">
                        <label for="km">KM</label>
                        <input type="number" id="km" placeholder="Ex: 125000" />
                    </div>
                    <div class="form-group" style="grid-column:1 / -1;">
                        <label for="descricao">Observações</label>
                        <textarea id="descricao" rows="2" placeholder="Ex: Revisão geral..."></textarea>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Serviços</h2>
                <div class="form-grid">
                    <div class="field field-wide">
                        <label for="servNome">Serviço</label>
                        <input id="servNome" type="text" placeholder="Ex: Troca de óleo" />
                    </div>
                    <div class="field">
                        <label for="servQtd">Qtd</label>
                        <input id="servQtd" type="number" value="1" />
                    </div>
                    <div class="field">
                        <label for="servValor">Valor (R$)</label>
                        <input id="servValor" type="number" placeholder="150.00" />
                    </div>
                </div>
                <div class="add-action">
                    <button id="btnAddServico" class="btn-add">Adicionar serviço</button>
                </div>
                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Serviço</th>
                                <th>Qtd</th>
                                <th>Unitário</th>
                                <th>Total</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyServicos"></tbody>
                    </table>
                </div>
                <div class="totals">
                    <span>Total serviços: <strong id="totalServicos">R$ 0,00</strong></span>
                </div>
            </section>

            <section class="card">
                <h2>Peças Utilizadas</h2>
                <datalist id="estoqueSugestoes"></datalist>
                <div class="parts-grid">
                    <div class="form-group">
                        <label for="nomePeca">Nome da peça</label>
                        <input type="text" id="nomePeca" list="estoqueSugestoes" placeholder="Filtro de óleo" />
                    </div>
                    <div class="form-group">
                        <label for="qtdPeca">Qtd</label>
                        <input type="number" id="qtdPeca" placeholder="1" />
                    </div>
                    <div class="form-group">
                        <label for="valorPeca">Valor unitário (R$)</label>
                        <input type="number" id="valorPeca" placeholder="35.90" />
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button id="btnAdicionarPeca" class="btn-add">Adicionar peça</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Peça</th>
                                <th>Qtd</th>
                                <th>Unitário</th>
                                <th>Total</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaPecas"></tbody>
                    </table>
                </div>
                <div class="totals">
                    <span>Total peças: <strong id="totalPecas">R$ 0,00</strong></span>
                </div>
            </section>

            <div class="actions">
                <button id="btnGerar" class="btn primary">Gerar orçamento</button>
                <button id="btnSalvar" class="btn secondary">Salvar orçamento</button>
                <button id="btnLimpar" class="btn danger">Limpar</button>
            </div>

            <section class="card" id="cardOrcamento" hidden>
                <h2>Orçamento Gerado</h2>
                <div id="orcamento-resultado"></div>
                <button id="btnPDF" class="btn secondary">Baixar PDF</button>
            </section>
        </div>

        <div id="tab-estoque" class="tab-pane" data-pane="tab-estoque" hidden>
            <section class="card">
                <h2>Controle de Estoque</h2>
                <div class="form-grid">
                    <div class="form-group"><label>Nome</label><input type="text" id="estNome"></div>
                    <div class="form-group"><label>SKU</label><input type="text" id="estSku"></div>
                    <div class="form-group"><label>Categoria</label><input type="text" id="estCat"></div>
                    <div class="form-group"><label>Custo</label><input type="number" id="estCusto"></div>
                    <div class="form-group"><label>Preço</label><input type="number" id="estPreco"></div>
                    <div class="form-group"><label>Qtd</label><input type="number" id="estQtd"></div>
                    <div class="form-group"><label>Mín</label><input type="number" id="estMin"></div>
                    <div class="form-group" style="align-self:end;">
                        <button id="btnAddItem" class="btn">Salvar Item</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Peça</th>
                                <th>Preço</th>
                                <th>Qtd</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyEstoque"></tbody>
                    </table>
                </div>
            </section>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/jspdf.plugin.autotable.min.js"></script>

    <script src="libs/core.js"></script>
    <script src="libs/dom.js"></script>
    <script src="libs/storage.js"></script>
    <script src="libs/tabs.js"></script>
    <script src="libs/validators.js"></script>
    <script src="libs/estoque.js"></script>
    <script src="libs/orcamento.js"></script>
    <script src="libs/pdf.js"></script>
    <script src="app.js"></script>

</body>

</html>
